<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pakistan Flight Tracker</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="heroCopy">
        <div class="eyebrow">Live airport board</div>
        <h1>Pakistan Flight Tracker</h1>
        <p class="subtitle">
          Flight board view for Pakistan airports with a UAE style dashboard layout
        </p>
      </div>

      <div class="heroBadges">
        <span class="badge">FlightAware</span>
        <span class="badge">Today + Tomorrow</span>
        <span class="badge">Dark board style</span>
      </div>
    </header>

    <section class="summaryCard">
      <div class="summaryHeader">
        <div>
          <h2>National Overview</h2>
          <div class="summarySub" id="lastUpdated">Loading…</div>
        </div>
      </div>
      <div class="metricStrip" id="nationalMetrics"></div>
    </section>

    <section id="warnings" class="warnings"></section>

    <main id="airportGrid" class="airportGrid"></main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
