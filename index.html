<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pakistan Flight Tracking</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brandIcon">✈</div>
        <div>
          <div class="brandTitle">Pakistan Flight Tracking</div>
          <div class="brandSub">Operations Dashboard <span class="liveDot"></span> LIVE</div>
        </div>
      </div>

      <div class="topbarRight">
        <button class="topbarBtn topbarBtnWarning" id="instructionsBtn">Instructions</button>
        <button class="topbarBtn topbarBtnDanger" id="crisisBtn">Crisis</button>
        <button class="topbarBtn topbarBtnSuccess" id="airlineStatusBtn">Airline Status</button>

        <div class="cacheWrap">
          <div class="cacheRow">
            <span id="cacheInfo">Cache updated</span>
            <span id="cacheCountdown">1:00</span>
          </div>
          <div class="cacheBar">
            <div class="cacheBarFill" id="cacheBarFill"></div>
          </div>
        </div>

        <div class="timeToggle">
          <button class="timeBtn active" data-tz="PKT">PKT</button>
          <button class="timeBtn" data-tz="UK">UK</button>
        </div>

        <button class="topbarBtn" id="briefingBtn">Briefing</button>
        <button class="topbarBtn" id="exportBtn">Export</button>
      </div>
    </header>

    <section class="kpis" id="kpis"></section>

    <section class="filtersCard">
      <div class="sectionHead">
        <div class="filtersTitle">Filters</div>
        <button class="linkBtn" id="resetFilters">Reset filters</button>
      </div>

      <div class="filtersGrid">
        <div class="filterGroup filterWide">
          <label>Day</label>
          <div class="segmented">
            <button class="seg active" data-day="today">Today</button>
            <button class="seg" data-day="tomorrow">Tomorrow</button>
            <button class="seg" data-day="all">All</button>
          </div>
        </div>

        <div class="filterGroup">
          <label>Direction</label>
          <select id="directionFilter">
            <option value="Both">Both</option>
            <option value="Departure">Departure</option>
            <option value="Arrival">Arrival</option>
          </select>
        </div>

        <div class="filterGroup">
          <label>Airport</label>
          <select id="airportFilter"></select>
        </div>

        <div class="filterGroup">
          <label>Airline</label>
          <select id="airlineFilter"></select>
        </div>

        <div class="filterGroup">
          <label>Status</label>
          <select id="statusFilter"></select>
        </div>

        <div class="filterGroup checkboxBlock">
          <label>Carrier set</label>
          <label class="checkboxRow">
            <input type="checkbox" id="minorCarrierToggle" />
            <span>Show smaller carriers</span>
          </label>
        </div>
      </div>
    </section>

    <section class="tableCard">
      <div class="tableToolbar">
        <div class="tableToolbarLeft">
          <div class="tab active">Flights <span id="flightCount">0</span></div>
        </div>
        <div class="tableToolbarRight">
          <div class="toolbarNote" id="timezoneNote">Pakistan time</div>
        </div>
      </div>

      <div id="warnings" class="warnings"></div>

      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Flight</th>
              <th>Airline</th>
              <th>Origin</th>
              <th>Dest</th>
              <th>Dep</th>
              <th>Arr</th>
              <th>Status</th>
              <th>Delay</th>
              <th>A/C</th>
              <th>Type</th>
              <th>Div</th>
            </tr>
          </thead>
          <tbody id="flightRows"></tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="modal hidden" id="briefingModal">
    <div class="modalCard">
      <div class="modalHead">
        <div class="modalTitle">Flight Briefing Summary</div>
        <button class="closeBtn" id="closeBriefingBtn">Close</button>
      </div>
      <div class="briefingBody" id="briefingBody"></div>
      <div class="modalActions">
        <button class="topbarBtn" id="printBriefingBtn">Print</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="instructionsModal">
    <div class="modalCard">
      <div class="modalHead">
        <div class="modalTitle">Dashboard Instructions</div>
        <button class="closeBtn" id="closeInstructionsBtn">Close</button>
      </div>
      <div class="briefingBody" id="instructionsBody"></div>
    </div>
  </div>

  <div class="modal hidden" id="crisisModal">
    <div class="modalCard">
      <div class="modalHead">
        <div class="modalTitle">Crisis Readout</div>
        <button class="closeBtn" id="closeCrisisBtn">Close</button>
      </div>
      <div class="briefingBody" id="crisisBody"></div>
    </div>
  </div>

  <div class="modal hidden" id="airlineStatusModal">
    <div class="modalCard">
      <div class="modalHead">
        <div class="modalTitle">Official Airline Status Links</div>
        <button class="closeBtn" id="closeAirlineStatusBtn">Close</button>
      </div>
      <div class="briefingBody" id="airlineStatusBody"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
